version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: unt-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unt_practicas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - unt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: unt-backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/unt_practicas?schema=public
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - unt-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: unt-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend
    networks:
      - unt-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  unt-network:
    driver: bridge